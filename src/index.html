<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>riddler.exe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="video" autoplay playsinline muted hidden></video>
  <canvas id="canvas" width="640" height="480"></canvas>
  <div id="crt"></div>

  <div class="overlay">
    <h1>riddler.exe</h1>
    <p id="status"></p>
  </div>

  <div id="controls">
    <div id="palette-buttons">
      <button class="palette-btn active" data-palette="green"  style="--swatch: #00ff66;"></button>
      <button class="palette-btn"        data-palette="purple" style="--swatch: #b450ff;"></button>
      <button class="palette-btn"        data-palette="amber"  style="--swatch: #ffb000;"></button>
      <button class="palette-btn"        data-palette="mono"   style="--swatch: #f0f0f0;"></button>
    </div>
    <div id="mode-buttons">
      <button class="mode-btn active" data-mode="bayer">bayer</button>
      <button class="mode-btn" data-mode="floyd-steinberg">f-s</button>
      <button class="mode-btn" data-mode="atkinson">atkinson</button>
      <button class="mode-btn" data-mode="halftone">halftone</button>
      <button class="mode-btn" data-mode="matrix">matrix</button>
      <button class="mode-btn" data-mode="ascii">ascii</button>
    </div>
    <div id="ascii-controls" style="display: none;">
      <label style="display: flex; flex-direction: column; gap: 0.4rem; font-size: 0.72rem;">
        <span>charset</span>
        <select id="ascii-charset">
          <option value="ascii">classic ascii</option>
          <option value="katakana">katakana</option>
          <option value="riddler">riddler</option>
          <option value="symbols">symbols</option>
        </select>
      </label>
    </div>
    <div id="glitch-controls">
      <button class="glitch-btn" id="glitch-toggle" data-active="false">glitch: off</button>
      <button class="glitch-btn" id="glitch-trigger">⚡ burst</button>
    </div>
    <label>
      <span>pixel size — <span id="pixel-val">1</span></span>
      <input type="range" id="pixel-size" min="1" max="12" value="1" step="1" />
    </label>
    <label>
      <span>contrast — <span id="contrast-val">0</span></span>
      <input type="range" id="contrast-input" min="-50" max="50" value="0" step="1" />
    </label>
  </div>

  <button id="ctrl-toggle" aria-label="Toggle controls">⚙</button>

  <div id="terminal"></div>

  <script src="script.js"></script>
</body>
</html>
